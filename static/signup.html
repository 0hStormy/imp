<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="root" class="bg">
        <div class="flex center expand vert blur">
            <div class="frame flex vert auth-prompt">
                <h2 class="center">IMP Sign-up</h2>
                <hr>
                <span>Username:</span>
                <input type="text" id="usernameField">
                <span>Password:</span>
                <input type="password" id="passwordField">
                <button id="signupSubmit">Sign-up</button>
                <a href="login.html">Have an account already?</a>
                <div class="error-popup" id="errorPopup">
                    <img src="error.png" alt="">
                    <span id="errorPopupSpan">Error</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="auth.js"></script>
</body>
</html>
